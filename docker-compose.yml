    if os.path.exists(PROJECT_NAME):
        print(f"目录 {PROJECT_NAME} 已存在，正在删除...")
        shutil.rmtree(PROJECT_NAME)
    
    os.makedirs(PROJECT_NAME)
    os.chdir(PROJECT_NAME)
    print(f"正在创建项目结构于: {os.getcwd()}")
    for file_path, content in FILE_LIST:
        dir_name = os.path.dirname(file_path)
        if dir_name:
            os.makedirs(dir_name, exist_ok=True)
        
        with open(file_path, 'w', encoding='utf-8') as f:
            f.write(content)
        print(f"已创建: {file_path}")
    
    init_files = [
        "app/__init__.py", "app/api/__init__.py", "app/core/__init__.py", 
        "app/agents/__init__.py", "app/llm/__init__.py", "app/utils/__init__.py",
        "app/llm/providers/__init__.py", "dashboard/__init__.py"
    ]
    for f_path in init_files:
        if not os.path.exists(f_path):
            with open(f_path, 'w') as f: pass
            print(f"已创建: {f_path}")
    os.makedirs("scripts", exist_ok=True)
    with open("scripts/install.sh", "w") as f:
        f.write("#!/bin/bash\ndocker-compose up --build -d")
    with open("scripts/install.bat", "w") as f:
