    # 启动每日 Token 重置
    auto_engine.sched.add_job(token_monitor.reset_daily, 'cron', hour=0)
    
    yield
    
    logger.info("正在关闭服务...")
    await auto_engine.shutdown()
    await mesh.shutdown()
    await close_db()
    logger.info("服务已安全关闭")
