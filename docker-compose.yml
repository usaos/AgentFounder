@asynccontextmanager
async def lifespan(app: FastAPI):
    logger.info("AgentFounder V5.0 (AGPL-3.0) 启动中...")
    await init_db()
    
    env = decrypt_env()
    
    # 启动 WebSocket 消息总线
    await mesh.start()
    
    # 启动心跳监测
    asyncio.create_task(start_health_monitor())
    
    # 启动工厂清理
